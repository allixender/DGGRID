name: Build DGGRID

on:
  # all branches except for pull requests, which are only built on master
  push:
    branches: [master,win-math,dev,develop,dggrid_main,'patch-','feature-']
  pull_request:
    branches: [master,dggrid_main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            artifact: dggrid
          - os: windows-latest
            name: windows
            artifact: dggrid.exe
          - os: macos-13        # Intel
            name: macos-x64
            artifact: dggrid
          - os: macos-14        # Apple Silicon (M1+)
            name: macos-arm64
            artifact: dggrid

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Find and prepare artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ matrix.name }}" = "windows" ]; then
            # MSVC puts binaries in a Release/ subfolder
            find build -name "dggrid.exe" -exec cp {} staging/ \;
          else
            find build -name "dggrid" -type f -executable -exec cp {} staging/ \;
          fi
          ls -la staging/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dggrid-${{ matrix.name }}
          path: staging/${{ matrix.artifact }}
          retention-days: 30