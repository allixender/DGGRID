name: Build DGGRID

on:
  # all branches except for pull requests, which are only built on master
  push:
    branches: [master,win-math,dev,develop,dggrid_main,'patch-','feature-']
    tags: ['v*']
  pull_request:
    branches: [master,dggrid_main]
  # Allow manual trigger
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            artifact: dggrid
            cmake_extra: -DCMAKE_EXE_LINKER_FLAGS=-static
          - os: windows-latest
            name: windows
            artifact: dggrid.exe
          - os: macos-14        # Cross-compile for Intel x86_64
            name: macos-x64
            artifact: dggrid
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - os: macos-14        # Apple Silicon (M1+)
            name: macos-arm64
            artifact: dggrid
            cmake_extra: ""

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release

      - name: Find and prepare artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ matrix.name }}" = "windows" ]; then
            # MSVC puts binaries in a Release/ subfolder
            find build -name "dggrid.exe" -exec cp {} staging/ \;
          else
            find build -name "dggrid" -type f -exec cp {} staging/ \;
          fi
          ls -la staging/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dggrid-${{ matrix.name }}
          path: staging/${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/dggrid-linux/dggrid          release/dggrid-linux
          cp artifacts/dggrid-windows/dggrid.exe    release/dggrid-windows.exe
          cp artifacts/dggrid-macos-x64/dggrid      release/dggrid-macos-x64
          cp artifacts/dggrid-macos-arm64/dggrid    release/dggrid-macos-arm64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "DGGRID ${{ github.ref_name }}" \
            --notes "Portable DGGRID binaries built from ${{ github.ref_name }}" \
            release/dggrid-linux \
            release/dggrid-windows.exe \
            release/dggrid-macos-x64 \
            release/dggrid-macos-arm64
